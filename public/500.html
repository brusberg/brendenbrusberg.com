<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#08100b" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/error.css" />
    <title>500 | Brenden Brusberg</title>
  </head>
  <body>
    <main class="error-shell" aria-labelledby="error-title">
      <section class="error-window">
        <p class="eyebrow">500 / signal outage</p>
        <h1 id="error-title">Something broke between stations.</h1>
        <p class="lede">
          The site hit a server-side snag. You can still head back to the main routes.
        </p>
        <nav class="route-grid" aria-label="Portfolio routes">
          <a class="route-card" href="/#ants">
            <span>Main Page</span>
          </a>
          <a class="route-card" href="/#stats">
            <span>Stats</span>
          </a>
          <a class="route-card" href="/#mandelbrot">
            <span>History</span>
          </a>
          <a class="route-card" href="/#art">
            <span>Projects and Writing</span>
          </a>
        </nav>
        <dl class="error-meta" aria-label="Error details">
          <div>
            <dt>Request ID</dt>
            <dd>::vercel:REQUEST_ID::</dd>
          </div>
          <div>
            <dt>Error</dt>
            <dd>::vercel:ERROR_CODE::</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
