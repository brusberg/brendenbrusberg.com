# Run repository checks only.
# Production deploys are handled by Vercel's Git integration.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate game rewrite config
        run: |
          node -e "const fs=require('fs'); const cfg=JSON.parse(fs.readFileSync('vercel.json','utf8')); const rewrites=cfg.rewrites||[]; const headers=cfg.headers||[]; const hasGame=rewrites.some((r)=>r.source==='/game'&&r.destination==='https://game-app.brendenbrusberg.com/game'); const hasGamePaths=rewrites.some((r)=>r.source==='/game/:path*'&&r.destination==='https://game-app.brendenbrusberg.com/game/:path*'); const hasNoIndex=headers.some((h)=>h.source==='/game'&&(h.headers||[]).some((v)=>v.key==='X-Robots-Tag'&&v.value==='noindex, nofollow')) && headers.some((h)=>h.source==='/game/:path*'&&(h.headers||[]).some((v)=>v.key==='X-Robots-Tag'&&v.value==='noindex, nofollow')); if (!hasGame || !hasGamePaths || !hasNoIndex) { throw new Error('Missing /game rewrite or noindex header'); }"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build project
        run: pnpm build
